name: Deploy Vite App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: ./Laku-responsive/app

      - name: Build
        run: npm run build
        working-directory: ./Laku-responsive/app

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./Laku-responsive/app/dist

      - uses: actions/deploy-pages@v5
